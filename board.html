<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI安全论文追踪看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .header h1 { 
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number { font-size: 36px; font-weight: bold; }
        .stat-label { opacity: 0.9; }
        
        .category { margin-bottom: 30px; }
        .category-title {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .paper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .paper {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .paper:hover { transform: translateY(-5px); }
        .paper-title { 
            font-size: 16px; 
            font-weight: 600; 
            color: #2c3e50; 
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .paper-meta { 
            color: #7f8c8d; 
            font-size: 13px; 
            margin-bottom: 10px;
        }
        .paper-summary { 
            color: #34495e; 
            font-size: 14px; 
            line-height: 1.6;
        }
        .paper-link { 
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .empty { text-align: center; color: white; padding: 20px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI安全论文追踪看板</h1>
            <p style="color: #7f8c8d;">最近7天 AI安全领域最新研究动态</p>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">总论文数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">活跃领域</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">2026-03-03</div>
                    <div class="stat-label">更新日期</div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-title">
                隐私保护 (0 篇)
            </div>
<div class="empty">暂无论文</div></div>
        <div class="category">
            <div class="category-title">
                鲁棒性安全 (0 篇)
            </div>
<div class="empty">暂无论文</div></div>
        <div class="category">
            <div class="category-title">
                系统安全 (0 篇)
            </div>
<div class="empty">暂无论文</div></div>
        <div class="category">
            <div class="category-title">
                AI安全 (0 篇)
            </div>
<div class="empty">暂无论文</div></div>
        <div class="category">
            <div class="category-title">
                其他 (0 篇)
            </div>
<div class="empty">暂无论文</div></div>
    </div>
</body>
</html>
