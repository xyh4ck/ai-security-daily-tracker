<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI安全论文追踪看板 - 2026年度</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .header h1 { 
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p { color: #7f8c8d; font-size: 14px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number { font-size: 36px; font-weight: bold; }
        .stat-label { opacity: 0.9; font-size: 14px; }
        
        .category { margin-bottom: 30px; }
        .category-title {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-count { 
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        .paper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .paper {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .paper:hover { transform: translateY(-5px); }
        .paper-title { 
            font-size: 16px; 
            font-weight: 600; 
            color: #2c3e50; 
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .paper-meta { 
            color: #7f8c8d; 
            font-size: 12px; 
            margin-bottom: 10px;
        }
        .paper-summary { 
            color: #34495e; 
            font-size: 13px; 
            line-height: 1.5;
        }
        .paper-link { 
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
        }
        .footer { 
            text-align: center; 
            color: white; 
            padding: 20px; 
            opacity: 0.9;
            font-size: 14px;
        }
        .loading { 
            text-align: center; 
            color: white; 
            padding: 40px; 
            font-size: 18px;
        }
        .error { 
            text-align: center; 
            background: #e74c3c;
            color: white; 
            padding: 20px; 
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ AI安全论文追踪看板 - 2026年度</h1>
            <p id="date-range">正在加载数据...</p>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="total-papers">-</div>
                    <div class="stat-label">总论文数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="active-categories">-</div>
                    <div class="stat-label">研究领域</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="update-date">-</div>
                    <div class="stat-label">更新日期</div>
                </div>
            </div>
        </div>

        <div id="loading" class="loading">
            📊 正在加载论文数据...
        </div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="categories-container"></div>

        <div class="footer">
            <p>📊 数据来源: arXiv (cs.CR, cs.LG, cs.AI, cs.CL) | 自动追踪系统</p>
            <p id="last-update">最后更新: -</p>
        </div>
    </div>

    <script>
        // 数据加载和渲染逻辑
        const DATA_URL = './data/papers-2026.json';
        
        // 分类显示顺序
        const categoryOrder = [
            '🤖 大模型/Agent安全',
            '🔒 隐私保护',
            '🛡️ 对抗机器学习',
            '🦠 恶意软件/威胁检测',
            '🔐 其他安全'
        ];

        async function loadData() {
            try {
                const response = await fetch(DATA_URL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                showError(`加载数据失败: ${error.message}`);
            }
        }

        function renderDashboard(data) {
            const papers = data.papers || [];
            
            // 按分类统计
            const categories = {};
            categoryOrder.forEach(cat => categories[cat] = []);
            
            papers.forEach(paper => {
                const cat = paper.category;
                if (categories.hasOwnProperty(cat)) {
                    categories[cat].push(paper);
                }
            });

            // 更新统计信息
            document.getElementById('total-papers').textContent = papers.length;
            document.getElementById('active-categories').textContent = 
                Object.values(categories).filter(c => c.length > 0).length;
            
            const updateDate = data.updated_at ? new Date(data.updated_at) : new Date();
            document.getElementById('update-date').textContent = 
                updateDate.toISOString().split('T')[0];
            
            document.getElementById('date-range').textContent = 
                `检索时间范围: 2026-01-01 至 ${updateDate.toISOString().split('T')[0]}`;
            
            document.getElementById('last-update').textContent = 
                `最后更新: ${updateDate.toLocaleString('zh-CN')}`;

            // 渲染各分类的论文
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            for (const catName of categoryOrder) {
                const catPapers = categories[catName];
                
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'category-title';
                titleDiv.innerHTML = `
                    ${catName}
                    <span class="category-count">${catPapers.length} 篇</span>
                `;
                categoryDiv.appendChild(titleDiv);

                const gridDiv = document.createElement('div');
                gridDiv.className = 'paper-grid';

                if (catPapers.length > 0) {
                    // 按日期排序，取最新10篇
                    const sortedPapers = catPapers
                        .sort((a, b) => new Date(b.published) - new Date(a.published))
                        .slice(0, 10);

                    sortedPapers.forEach(paper => {
                        const paperDiv = document.createElement('div');
                        paperDiv.className = 'paper';
                        
                        const summary = (paper.summary || '').substring(0, 150).replace(/\n/g, ' ');
                        const author = (paper.author || 'Unknown').substring(0, 30);
                        
                        paperDiv.innerHTML = `
                            <div class="paper-title">${escapeHtml(paper.title.substring(0, 80))}...</div>
                            <div class="paper-meta">📅 ${paper.published} | 👤 ${escapeHtml(author)}</div>
                            <div class="paper-summary">${escapeHtml(summary)}...</div>
                            <a href="${paper.url}" target="_blank" class="paper-link">→ 查看论文</a>
                        `;
                        gridDiv.appendChild(paperDiv);
                    });
                } else {
                    gridDiv.innerHTML = '<div class="empty">暂无论文</div>';
                }

                categoryDiv.appendChild(gridDiv);
                container.appendChild(categoryDiv);
            }

            // 隐藏加载提示
            document.getElementById('loading').style.display = 'none';
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载时自动加载数据
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
